version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ifb-pcr-backend:latest
    container_name: ifb-pcr-backend
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_CLIENT=pg
      - DB_HOST=db
      - DB_PORT=5432
      - PRIVATE_KEY_PATH=/app/private.pem
    volumes:
      # Mount private.pem read-only so secrets aren't baked into the build
      - ./private.pem:/app/private.pem:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: ifb-pcr-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ifb_pcr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ifb_pcr}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
