version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ifb-pcr-backend:latest
    container_name: ifb-pcr-backend
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_CLIENT=mysql2
      - DB_HOST=db
      - DB_PORT=3306
      - PRIVATE_KEY_PATH=/app/private.pem
    volumes:
      # Mount private.pem read-only so secrets aren't baked into the build
      - ./private.pem:/app/private.pem:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: ifb-pcr-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ifb_pcr}
      MYSQL_USER: ${DB_USER:-iotlocaluser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-FIRE1in2the3hole@}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-FIRE1in2the3hole@}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
